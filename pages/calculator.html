<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор - Цифровой климат Якутии</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%276%27 fill=%27%237b9bb5%27/%3E%3Cpath d=%27M14 22V7a2.5 2.5 0 0 1 5 0v15a4 4 0 1 1-5 0z%27 fill=%27%23fff%27/%3E%3Ccircle cx=%2716.5%27 cy=%2722%27 r=%272.5%27 fill=%27%237b9bb5%27/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="header__top">
                <a href="../index.html" class="logo">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
                    Цифровой климат Якутии
                </a>
                <button class="theme-toggle" id="themeToggle" title="Тёмная тема" aria-label="Переключить тему">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
            <nav class="nav">
                <ul class="nav__list">
                    <li><a href="../index.html" class="nav__link">Главная</a></li>
                    <li><a href="charts.html" class="nav__link">Графики</a></li>
                    <li><a href="table.html" class="nav__link">Данные</a></li>
                    <li><a href="calculator.html" class="nav__link nav__link--active">Калькулятор</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <nav class="breadcrumbs"><div class="container"><a href="../index.html">Главная</a> <span>›</span> Калькулятор</div></nav>

    <main class="container">

        <section class="section reveal">
            <h2 class="section__title">Калькулятор единиц измерения</h2>
            <div class="calculator" style="margin-top:20px">
                <div class="calc__row">
                    <label class="calc__label">Конвертация:</label>
                    <select class="calc__select" id="conversionType">
                        <option value="temp">°C ↔ °F</option>
                        <option value="rain">мм ↔ дюймы</option>
                        <option value="wind">м/с ↔ км/ч</option>
                    </select>
                </div>
                <div class="calc__row">
                    <input type="number" class="calc__input" id="calcInput" placeholder="Значение" step="any">
                    <span class="calc__arrow">→</span>
                    <span class="calc__result" id="calcResult">—</span>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer">
        <div class="container footer__inner">
            <p>&copy; 2026 - Курсовая работа по веб-программированию</p>
            <p>Источник данных: открытые метеорологические архивы</p>
            <p class="footer__clock" id="yakutskClock"></p>
        </div>
    </footer>

    <button class="back-to-top" id="backToTop" title="Наверх" aria-label="Наверх">↑</button>
<script src="../js/data.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/calculator.js"></script>
</body>
</html>
